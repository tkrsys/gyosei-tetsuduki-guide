html+=`<div class="art-item ${isOpen?'open':''}" id="article-${ak}"><div class="art-header" onclick="toggleArticle('${ak}')"><div class="art-num">${numLabel}</div><div class="art-title-text">${a.title}<span class="art-badge ${badge.class}">${badge.text}</span></div><span class="art-arrow">▶</span></div>`;
if(isOpen){const apiNum=a.num.replace('の2','').replace('の3','');html+=`<div class="art-detail"><div class="art-text"><div class="art-text-header"><div class="art-text-title">📋 条文</div><div class="art-links"><a href="${getEgovApiUrl(apiNum)}" target="_blank" class="api-link">API直接取得</a><a href="${getEgovUrl()}" target="_blank" class="egov-link">e-Gov法令検索</a></div></div><div class="art-text-body">${a.text}</div></div><div class="explanations"><div class="exp-item exp-practical"><div class="exp-header">📘 実務・試験向け解説</div><div class="exp-body">${a.practical.replace(/\n/g,'<br>')}</div></div><div class="exp-item exp-beginner"><div class="exp-header">🌱 初学者向け解説</div><div class="exp-body">${a.beginner.replace(/\n/g,'<br>')}</div></div>${a.exam?`<div class="exp-item exp-exam"><div class="exp-header">🎯 試験対策ポイント</div><div class="exp-body">${a.exam.replace(/\n/g,'<br>')}</div></div>`:''}</div></div>`;}
html+=`</div>`;});
html+=`</div></div></div>`;});
html+=`</div></div>`;
if(!visibleCount){html=`<div class="no-results">🔍 「${searchQuery}」に一致する条文が見つかりませんでした。</div>`;}
content.innerHTML=html;
const sc=document.getElementById('searchCount');sc.textContent=searchQuery?`${visibleCount}件の条文が見つかりました`:'';}
function setFlow(id){currentFlow=id;openGroups={};openArticles={};renderNavTabs();renderContent();window.scrollTo(0,0);}
function toggleGroup(gk){openGroups[gk]=!openGroups[gk];if(!openGroups[gk]){Object.keys(openArticles).forEach(k=>{if(k.startsWith(gk))delete openArticles[k];});}renderContent();}
function toggleArticle(ak){const wasOpen=openArticles[ak];openArticles={};if(!wasOpen)openArticles[ak]=true;renderContent();if(!wasOpen)setTimeout(()=>{const el=document.getElementById('article-'+ak);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function doSearch(){searchQuery=document.getElementById('searchInput').value.trim();openGroups={};openArticles={};renderContent();}
renderNavTabs();renderContent();
</script>
